"use client";

export const dynamic = "force-dynamic";

import { useEffect, useState } from "react";
import { collection, query, where, getDocs } from "firebase/firestore";
import { db } from "@/lib/firebase";
import { useAuth } from "@/app/_context/AuthContext";
import { ExamResult, Exam } from "@/lib/types";

export default function TeacherResultsPage() {
  const { profile } = useAuth();
  const [results, setResults] = useState<ExamResult[]>([]);
  const [exams, setExams] = useState<Exam[]>([]);
  const [selectedExamId, setSelectedExamId] = useState<string>("all");
  const [expandedId, setExpandedId] = useState<string | null>(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!profile) return;

    async function load() {
      const [examsSnap, resultsSnap] = await Promise.all([
        getDocs(query(collection(db, "exams"), where("teacherId", "==", profile!.uid))),
        getDocs(query(collection(db, "results"), where("teacherId", "==", profile!.uid))),
      ]);
      setExams(examsSnap.docs.map((d) => ({ id: d.id, ...d.data() }) as Exam));
      const sorted = resultsSnap.docs
        .map((d) => ({ id: d.id, ...d.data() }) as ExamResult)
        .sort((a, b) => b.submittedAt - a.submittedAt);
      setResults(sorted);
      setLoading(false);
    }

    load();
  }, [profile]);

  const filtered =
    selectedExamId === "all" ? results : results.filter((r) => r.examId === selectedExamId);

  function formatDate(ts: number) {
    return new Date(ts).toLocaleDateString("tr-TR", {
      day: "2-digit",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function scoreColor(score: number, total: number) {
    const pct = (score / total) * 100;
    if (pct >= 75) return "text-green-600 bg-green-50 border-green-200";
    if (pct >= 50) return "text-yellow-600 bg-yellow-50 border-yellow-200";
    return "text-red-600 bg-red-50 border-red-200";
  }

  function getExam(examId: string) {
    return exams.find((e) => e.id === examId);
  }

  return (
    <div>
      <div className="mb-8">
        <h2 className="text-2xl font-bold text-gray-900">Sınav Sonuçları</h2>
        <p className="text-gray-500 text-sm mt-1">Öğrencilerin cevaplarını ve performansını detaylı inceleyin.</p>
      </div>

      <div className="mb-5">
        <select
          value={selectedExamId}
          onChange={(e) => { setSelectedExamId(e.target.value); setExpandedId(null); }}
          className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white"
        >
          <option value="all">Tüm Sınavlar</option>
          {exams.map((ex) => (
            <option key={ex.id} value={ex.id}>{ex.title}</option>
          ))}
        </select>
      </div>

      {loading ? (
        <div className="flex items-center justify-center h-40">
          <div className="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin" />
        </div>
      ) : filtered.length === 0 ? (
        <div className="bg-white rounded-2xl border border-gray-200 p-10 text-center">
          <p className="text-gray-400 text-sm">Henüz sonuç bulunmuyor.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map((r) => {
            const exam = getExam(r.examId);
            const isOpen = expandedId === r.id;
            const pct = Math.round((r.score / r.totalQuestions) * 100);

            return (
              <div key={r.id} className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                <div
                  className="flex items-center justify-between px-6 py-4 cursor-pointer hover:bg-gray-50/50 transition"
                  onClick={() => setExpandedId(isOpen ? null : r.id)}
                >
                  <div className="flex items-center gap-4 min-w-0">
                    <div className="min-w-0">
                      <p className="font-semibold text-gray-900 text-sm">{r.studentName}</p>
                      <p className="text-xs text-gray-400 mt-0.5">{r.examTitle} · {formatDate(r.submittedAt)}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-3 shrink-0">
                    <div className="text-right mr-2">
                      <div className="flex items-center gap-2">
                        <div className="w-24 bg-gray-100 rounded-full h-1.5">
                          <div className="bg-indigo-500 h-1.5 rounded-full" style={{ width: `${pct}%` }} />
                        </div>
                        <span className="text-xs text-gray-500 w-12 text-right">{pct}%</span>
                      </div>
                      <p className="text-xs text-gray-400 mt-1 text-right">{r.score}/{r.totalQuestions} doğru</p>
                    </div>
                    <span className={`text-xs font-semibold px-2.5 py-1 rounded-full border ${scoreColor(r.score, r.totalQuestions)}`}>
                      {r.score}/{r.totalQuestions}
                    </span>
                    <svg
                      className={`w-4 h-4 text-gray-400 transition-transform ${isOpen ? "rotate-180" : ""}`}
                      fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    >
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                    </svg>
                  </div>
                </div>

                {isOpen && exam && (
                  <div className="border-t border-gray-100 px-6 py-5 bg-gray-50/30">
                    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Soru Detayları</p>
                    <div className="space-y-4">
                      {exam.questions.map((q, qi) => {
                        const answer = r.answers.find((a) => a.questionId === q.id);
                        const selected = answer?.selectedIndex ?? -1;
                        const correct = q.correctIndex;
                        const isCorrect = selected === correct;

                        return (
                          <div key={q.id} className={`rounded-xl border p-4 ${isCorrect ? "border-green-200 bg-green-50/50" : "border-red-200 bg-red-50/50"}`}>
                            <div className="flex items-start gap-3 mb-3">
                              <span className={`shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${isCorrect ? "bg-green-500 text-white" : "bg-red-500 text-white"}`}>
                                {qi + 1}
                              </span>
                              <p className="text-sm font-medium text-gray-800">{q.text}</p>
                            </div>
                            <div className="ml-9 space-y-1.5">
                              {q.options.map((opt, oi) => {
                                const isSelected = oi === selected;
                                const isCorrectOpt = oi === correct;

                                let style = "border-gray-200 bg-white text-gray-600";
                                if (isCorrectOpt) style = "border-green-400 bg-green-50 text-green-800 font-semibold";
                                else if (isSelected && !isCorrectOpt) style = "border-red-400 bg-red-50 text-red-700 line-through";

                                return (
                                  <div key={oi} className={`flex items-center gap-2 px-3 py-2 rounded-lg border text-xs ${style}`}>
                                    <span className="font-bold shrink-0">{String.fromCharCode(65 + oi)}.</span>
                                    <span>{opt}</span>
                                    {isCorrectOpt && (
                                      <span className="ml-auto text-green-600 font-semibold">Doğru cevap</span>
                                    )}
                                    {isSelected && !isCorrectOpt && (
                                      <span className="ml-auto text-red-500 font-semibold">Öğrenci seçimi</span>
                                    )}
                                  </div>
                                );
                              })}
                              {selected === -1 && (
                                <p className="text-xs text-gray-400 italic px-3">Bu soru cevaplanmadı</p>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
