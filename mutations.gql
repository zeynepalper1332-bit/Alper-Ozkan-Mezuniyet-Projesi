"use client";

export const dynamic = "force-dynamic";

import { useEffect, useState } from "react";
import { collection, query, where, getDocs, deleteDoc, doc } from "firebase/firestore";
import { db } from "@/lib/firebase";
import { useAuth } from "@/app/_context/AuthContext";
import { Exam } from "@/lib/types";
import Link from "next/link";

export default function TeacherExamsPage() {
  const { profile } = useAuth();
  const [exams, setExams] = useState<Exam[]>([]);
  const [loading, setLoading] = useState(true);
  const [deleting, setDeleting] = useState<string | null>(null);
  const [expandedId, setExpandedId] = useState<string | null>(null);

  async function load() {
    if (!profile) return;
    const snap = await getDocs(
      query(collection(db, "exams"), where("teacherId", "==", profile.uid))
    );
    setExams(
      snap.docs
        .map((d) => ({ id: d.id, ...d.data() }) as Exam)
        .sort((a, b) => b.createdAt - a.createdAt)
    );
    setLoading(false);
  }

  useEffect(() => { load(); }, [profile]);

  async function handleDelete(examId: string) {
    if (!confirm("Bu sınavı silmek istediğinizden emin misiniz?")) return;
    setDeleting(examId);
    await deleteDoc(doc(db, "exams", examId));
    setExams((prev) => prev.filter((e) => e.id !== examId));
    setDeleting(null);
  }

  function formatDate(ts: number) {
    return new Date(ts).toLocaleDateString("tr-TR", {
      day: "numeric", month: "long", year: "numeric",
    });
  }

  function formatScheduled(ts: number) {
    return new Date(ts).toLocaleDateString("tr-TR", {
      day: "numeric", month: "long", year: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  }

  const now = Date.now();

  function examStatus(ex: Exam): { label: string; style: string } {
    if (!ex.scheduledAt) return { label: "Aktif", style: "bg-green-50 text-green-700 border-green-200" };
    if (ex.scheduledAt > now) return { label: "Planlandı", style: "bg-indigo-50 text-indigo-700 border-indigo-200" };
    return { label: "Süresi Geçti", style: "bg-gray-100 text-gray-500 border-gray-200" };
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-8">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Sınavlarım</h2>
          <p className="text-gray-500 text-sm mt-1">Oluşturduğunuz tüm sınavları buradan yönetin.</p>
        </div>
        <Link
          href="/teacher/exams/create"
          className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition"
        >
          + Yeni Sınav
        </Link>
      </div>

      {loading ? (
        <div className="flex items-center justify-center h-40">
          <div className="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin" />
        </div>
      ) : exams.length === 0 ? (
        <div className="bg-white rounded-2xl border border-gray-200 p-12 text-center">
          <div className="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg className="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <p className="text-gray-500 font-medium">Henüz sınav oluşturmadınız</p>
          <Link href="/teacher/exams/create" className="text-indigo-600 text-sm font-medium hover:underline mt-2 inline-block">
            İlk sınavı oluştur
          </Link>
        </div>
      ) : (
        <div className="space-y-3">
          {exams.map((ex) => {
            const { label, style } = examStatus(ex);
            const isOpen = expandedId === ex.id;

            return (
              <div key={ex.id} className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                <div className="px-6 py-4 flex items-center justify-between gap-4">
                  <div
                    className="flex-1 min-w-0 cursor-pointer"
                    onClick={() => setExpandedId(isOpen ? null : ex.id)}
                  >
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full border ${style}`}>
                        {label}
                      </span>
                      {ex.scheduledAt && ex.scheduledAt > now && (
                        <span className="text-xs text-gray-400">{formatScheduled(ex.scheduledAt)}</span>
                      )}
                    </div>
                    <p className="font-semibold text-gray-900 truncate">{ex.title}</p>
                    {ex.description && (
                      <p className="text-xs text-gray-400 mt-0.5 truncate">{ex.description}</p>
                    )}
                    <div className="flex items-center gap-3 mt-1.5 text-xs text-gray-400">
                      <span>{ex.questions.length} soru</span>
                      <span>·</span>
                      <span>{ex.durationMinutes} dakika</span>
                      <span>·</span>
                      <span>{ex.studentIds.length} öğrenci</span>
                      <span>·</span>
                      <span>{formatDate(ex.createdAt)}</span>
                    </div>
                  </div>

                  <div className="flex items-center gap-2 shrink-0">
                    <button
                      onClick={() => setExpandedId(isOpen ? null : ex.id)}
                      className="text-xs text-gray-500 hover:text-gray-800 px-3 py-1.5 rounded-lg border border-gray-200 hover:border-gray-300 transition"
                    >
                      {isOpen ? "Kapat" : "Detay"}
                    </button>
                    <button
                      onClick={() => handleDelete(ex.id)}
                      disabled={deleting === ex.id}
                      className="text-xs text-red-400 hover:text-red-600 px-3 py-1.5 rounded-lg border border-red-100 hover:border-red-300 transition disabled:opacity-50"
                    >
                      {deleting === ex.id ? "..." : "Sil"}
                    </button>
                  </div>
                </div>

                {isOpen && (
                  <div className="border-t border-gray-100 px-6 py-5 bg-gray-50/40">
                    <div className="grid sm:grid-cols-2 gap-6">
                      <div>
                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Sorular</p>
                        <div className="space-y-3">
                          {ex.questions.map((q, qi) => (
                            <div key={q.id} className="bg-white rounded-xl border border-gray-100 p-4">
                              <p className="text-sm font-medium text-gray-800 mb-2">
                                <span className="text-indigo-500 font-bold mr-1">{qi + 1}.</span>
                                {q.text}
                              </p>
                              <div className="space-y-1">
                                {q.options.map((opt, oi) => (
                                  <div
                                    key={oi}
                                    className={`text-xs px-3 py-1.5 rounded-lg flex items-center gap-2 ${
                                      oi === q.correctIndex
                                        ? "bg-green-50 text-green-700 font-semibold"
                                        : "text-gray-500"
                                    }`}
                                  >
                                    <span className="font-bold">{String.fromCharCode(65 + oi)}.</span>
                                    <span>{opt}</span>
                                    {oi === q.correctIndex && (
                                      <span className="ml-auto text-green-500">Doğru</span>
                                    )}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div>
                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Atanan Öğrenciler ({ex.studentIds.length})</p>
                        <StudentList studentIds={ex.studentIds} />
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StudentList({ studentIds }: { studentIds: string[] }) {
  const [names, setNames] = useState<string[]>([]);

  useEffect(() => {
    if (studentIds.length === 0) return;
    Promise.all(
      studentIds.map((uid) =>
        getDocs(query(collection(db, "users"), where("uid", "==", uid))).then(
          (snap) => snap.docs[0]?.data()?.name ?? uid
        )
      )
    ).then(setNames);
  }, [studentIds]);

  if (studentIds.length === 0) return <p className="text-xs text-gray-400">Öğrenci atanmadı.</p>;

  return (
    <div className="bg-white rounded-xl border border-gray-100 divide-y divide-gray-50 max-h-64 overflow-y-auto">
      {studentIds.map((uid, i) => (
        <div key={uid} className="px-4 py-2 text-xs text-gray-700">
          {names[i] ?? uid}
        </div>
      ))}
    </div>
  );
}
